{% extends 'base.html' %}
{% block title %}Cities  SINEMA{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h4 class="mb-0" style="font-weight:700;"><i class="bi bi-building-fill me-2 text-info"></i>Manage Cities</h4>
    <p class="text-muted mb-0" style="font-size:.85rem;">Add and manage cities within provinces</p>
  </div>
</div>

<div class="row g-4">
  <div class="col-lg-4">
    <div class="card h-100">
      <div class="card-body p-4">
        <h6 class="card-title mb-3" style="font-weight:600;"><i class="bi bi-plus-circle me-1 text-success"></i>Add City</h6>
        <form id="cityForm">
          <div class="mb-3">
            <label class="form-label small">Province</label>
            <select id="cityProv" class="form-select" required>
              <option value="">Select Province</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label small">City Name</label>
            <input type="text" id="cityName" class="form-control" placeholder="e.g. Bandung" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-plus-lg me-1"></i>Add City
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-8">
    <div class="card">
      <div class="card-body p-0">
        <div class="d-flex align-items-center justify-content-between p-3 border-bottom">
          <span style="font-weight:600;font-size:.95rem;"><i class="bi bi-list-ul me-1"></i>Cities List</span>
          <span id="cityCount" class="badge bg-info rounded-pill">0</span>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th style="padding-left:1.25rem;">City</th>
                <th>Province</th>
                <th class="text-end" style="padding-right:1.25rem;">Actions</th>
              </tr>
            </thead>
            <tbody id="cityTbody">
              <tr><td colspan="3" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2"></div>Loading</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2 text-warning"></i>Edit City</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">
        <input type="hidden" id="editId">
        <div class="mb-3">
          <label class="form-label small">Province</label>
          <select id="editProv" class="form-select"></select>
        </div>
        <div class="mb-3">
          <label class="form-label small">City Name</label>
          <input type="text" id="editName" class="form-control">
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-warning btn-sm" id="btnSaveEdit"><i class="bi bi-check-lg me-1"></i>Save Changes</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const token = localStorage.getItem('token');
  if (!token) location.href='/';

  const editModal = new bootstrap.Modal(document.getElementById('editModal'));
  let provincesCache = [];

  async function loadProvinces(){
    const res = await fetch('/provinces', { headers:{ 'Authorization':'Bearer '+token } });
    provincesCache = res.ok ? await res.json() : [];
    const sel = document.getElementById('cityProv');
    sel.innerHTML = '<option value="">Select Province</option>';
    provincesCache.forEach(p => sel.insertAdjacentHTML('beforeend', `<option value="${p.id}">${p.name}</option>`));
  }

  function fillProvSelect(selId, selectedId){
    const sel = document.getElementById(selId);
    sel.innerHTML = '';
    provincesCache.forEach(p => {
      sel.insertAdjacentHTML('beforeend', `<option value="${p.id}" ${p.id==selectedId?'selected':''}>${p.name}</option>`);
    });
  }

  async function loadCities(){
    const res = await fetch('/cities', { headers:{ 'Authorization':'Bearer '+token } });
    const list = res.ok ? await res.json() : [];
    const tbody = document.getElementById('cityTbody');
    document.getElementById('cityCount').textContent = list.length;
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-4">No cities yet. Add one above.</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    list.forEach(c => {
      const provName = (provincesCache.find(p=>p.id==c.province_id)||{}).name || c.province_id;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="padding-left:1.25rem;">
          <div class="d-flex align-items-center gap-2">
            <span class="badge bg-info-subtle text-info rounded-circle" style="width:32px;height:32px;line-height:32px;text-align:center;font-size:.8rem;">${c.name.charAt(0).toUpperCase()}</span>
            <span style="font-weight:500;">${c.name}</span>
          </div>
        </td>
        <td><span class="badge bg-secondary-subtle text-secondary">${provName}</span></td>
        <td class="text-end" style="padding-right:1.25rem;">
          <button class="btn btn-sm btn-outline-warning me-1" onclick="openEdit('${c.id}','${c.province_id}','${c.name.replace(/'/g,"\\'")}')">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger" onclick="delCity('${c.id}')">
            <i class="bi bi-trash3"></i>
          </button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  document.getElementById('cityForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving';
    const res = await fetch('/cities',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ province_id: document.getElementById('cityProv').value, name: document.getElementById('cityName').value })
    });
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-plus-lg me-1"></i>Add City';
    if (res.ok) { document.getElementById('cityForm').reset(); showToast('City added successfully'); loadCities(); }
    else showToast('Failed to add city', 'danger');
  });

  window.openEdit = (id, provId, name) => {
    document.getElementById('editId').value = id;
    document.getElementById('editName').value = name;
    fillProvSelect('editProv', provId);
    editModal.show();
  };

  document.getElementById('btnSaveEdit').addEventListener('click', async () => {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('editName').value.trim();
    const provId = document.getElementById('editProv').value;
    if (!name || !provId) return;
    const res = await fetch(`/cities/${id}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ province_id: provId, name })
    });
    editModal.hide();
    if (res.ok) { showToast('City updated'); loadCities(); }
    else showToast('Update failed', 'danger');
  });

  window.delCity = async id => {
    if (!confirm('Delete this city?')) return;
    const res = await fetch(`/cities/${id}`,{ method:'DELETE', headers:{ 'Authorization':'Bearer '+token }});
    if (res.ok) { showToast('City deleted', 'warning'); loadCities(); }
    else showToast('Delete failed', 'danger');
  };

  loadProvinces().then(loadCities);
</script>
{% endblock %}
