{% extends 'base.html' %}
{% block title %}Users  SINEMA{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h4 class="mb-0" style="font-weight:700;"><i class="bi bi-people-fill me-2 text-warning"></i>Manage Users</h4>
    <p class="text-muted mb-0" style="font-size:.85rem;">Create and manage application user accounts</p>
  </div>
</div>

<div class="row g-4">
  <div class="col-lg-4">
    <div class="card h-100">
      <div class="card-body p-4">
        <h6 class="card-title mb-3" style="font-weight:600;"><i class="bi bi-person-plus me-1 text-success"></i>Create User</h6>
        <form id="createForm">
          <div class="mb-3">
            <label class="form-label small">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="newUsername" class="form-control" placeholder="Username" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="newPassword" class="form-control" placeholder="Password" required>
              <button type="button" class="btn btn-outline-secondary" id="togglePw">
                <i class="bi bi-eye" id="togglePwIcon"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-check me-1"></i>Create Account
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-8">
    <div class="card">
      <div class="card-body p-0">
        <div class="d-flex align-items-center justify-content-between p-3 border-bottom">
          <span style="font-weight:600;font-size:.95rem;"><i class="bi bi-people me-1"></i>User Accounts</span>
          <span id="userCount" class="badge bg-warning text-dark rounded-pill">0</span>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th style="padding-left:1.25rem;">User</th>
                <th>Account ID</th>
                <th class="text-end" style="padding-right:1.25rem;">Actions</th>
              </tr>
            </thead>
            <tbody id="usersTbody">
              <tr><td colspan="3" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2"></div>Loading</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const token = localStorage.getItem('token');
  if (!token) location.href='/';

  const avatarColors = ['#1e3a6e','#0f6e5e','#6d28d9','#b45309','#be185d','#155e75','#166534'];

  function getInitial(name){ return name ? name.charAt(0).toUpperCase() : '?'; }
  function getAvatarColor(name){
    let h = 0;
    for (let i=0;i<name.length;i++) h = name.charCodeAt(i) + ((h<<5) - h);
    return avatarColors[Math.abs(h) % avatarColors.length];
  }

  function loadUsers(){
    fetch('/users', { headers:{ 'Authorization':'Bearer '+token } })
      .then(r => r.json())
      .then(list => {
        const tbody = document.getElementById('usersTbody');
        document.getElementById('userCount').textContent = list.length;
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-4">No users yet.</td></tr>';
          return;
        }
        tbody.innerHTML = '';
        list.forEach(u => {
          const color = getAvatarColor(u.username);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="padding-left:1.25rem;">
              <div class="d-flex align-items-center gap-2">
                <span style="width:34px;height:34px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem;flex-shrink:0;">${getInitial(u.username)}</span>
                <div>
                  <div style="font-weight:500;">${u.username}</div>
                  <div style="font-size:.75rem;color:#9ca3af;">Local account</div>
                </div>
              </div>
            </td>
            <td><code style="font-size:.72rem;color:#6b7280;">${u.id}</code></td>
            <td class="text-end" style="padding-right:1.25rem;">
              <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})">
                <i class="bi bi-trash3"></i>
              </button>
            </td>`;
          tbody.appendChild(tr);
        });
      });
  }

  // Toggle password visibility
  document.getElementById('togglePw').addEventListener('click', () => {
    const pw = document.getElementById('newPassword');
    const icon = document.getElementById('togglePwIcon');
    if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
  });

  function deleteUser(id){
    if (!confirm('Delete user ' + id + '?')) return;
    fetch(`/users/${id}`, { method:'DELETE', headers:{ 'Authorization':'Bearer '+token } })
      .then(() => { showToast('User deleted', 'warning'); loadUsers(); });
  }

  document.getElementById('createForm').addEventListener('submit', e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Creating';
    fetch('/register', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
      body: JSON.stringify({
        username: document.getElementById('newUsername').value,
        password: document.getElementById('newPassword').value
      })
    })
    .then(r => {
      btn.disabled = false; btn.innerHTML = '<i class="bi bi-person-check me-1"></i>Create Account';
      if (r.status === 201) return r.json().then(() => { e.target.reset(); showToast('User created successfully'); loadUsers(); });
      throw new Error('status ' + r.status);
    })
    .catch(err => {
      btn.disabled = false; btn.innerHTML = '<i class="bi bi-person-check me-1"></i>Create Account';
      showToast('Failed to create user: ' + err.message, 'danger');
    });
  });

  loadUsers();
</script>
{% endblock %}
