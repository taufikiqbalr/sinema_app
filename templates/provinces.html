{% extends 'base.html' %}
{% block title %}Provinces  SINEMA{% endblock %}
{% block content %}
<!-- Page Header -->
<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h4 class="mb-0 fw-700" style="font-weight:700;"><i class="bi bi-flag-fill me-2 text-primary"></i>Manage Provinces</h4>
    <p class="text-muted mb-0" style="font-size:.85rem;">Add and manage administrative provinces</p>
  </div>
</div>

<div class="row g-4">
  <!-- Add form card -->
  <div class="col-lg-4">
    <div class="card h-100">
      <div class="card-body p-4">
        <h6 class="card-title fw-600 mb-3" style="font-weight:600;"><i class="bi bi-plus-circle me-1 text-success"></i>Add Province</h6>
        <form id="provForm">
          <div class="mb-3">
            <label class="form-label small fw-500">Province Name</label>
            <input type="text" id="provName" class="form-control" placeholder="e.g. West Java" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-plus-lg me-1"></i>Add Province
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Table card -->
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body p-0">
        <div class="d-flex align-items-center justify-content-between p-3 border-bottom">
          <span class="fw-600" style="font-weight:600;font-size:.95rem;"><i class="bi bi-list-ul me-1"></i>Provinces List</span>
          <span id="provCount" class="badge bg-primary rounded-pill">0</span>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr><th style="padding-left:1.25rem;">Name</th><th class="text-end" style="padding-right:1.25rem;">Actions</th></tr>
            </thead>
            <tbody id="provTbody">
              <tr><td colspan="2" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2"></div>Loading</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2 text-warning"></i>Edit Province</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">
        <input type="hidden" id="editId">
        <div class="mb-3">
          <label class="form-label small">Province Name</label>
          <input type="text" id="editName" class="form-control">
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-warning btn-sm" id="btnSaveEdit"><i class="bi bi-check-lg me-1"></i>Save Changes</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const token = localStorage.getItem('token');
  if (!token) location.href='/';

  const editModal = new bootstrap.Modal(document.getElementById('editModal'));

  async function loadProvinces(){
    const res = await fetch('/provinces', { headers:{ 'Authorization':'Bearer '+token } });
    const list = res.ok ? await res.json() : [];
    const tbody = document.getElementById('provTbody');
    document.getElementById('provCount').textContent = list.length;
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted py-4">No provinces yet. Add one above.</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    list.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="padding-left:1.25rem;">
          <div class="d-flex align-items-center gap-2">
            <span class="badge bg-primary-subtle text-primary rounded-circle" style="width:32px;height:32px;line-height:32px;text-align:center;font-size:.8rem;">${p.name.charAt(0).toUpperCase()}</span>
            <span class="fw-500">${p.name}</span>
          </div>
        </td>
        <td class="text-end" style="padding-right:1.25rem;">
          <button class="btn btn-sm btn-outline-warning me-1" onclick="openEdit('${p.id}','${p.name.replace(/'/g,"\\'")}')">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger" onclick="delProv('${p.id}')">
            <i class="bi bi-trash3"></i>
          </button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  document.getElementById('provForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving';
    const res = await fetch('/provinces',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ name: document.getElementById('provName').value })
    });
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-plus-lg me-1"></i>Add Province';
    if (res.ok) { document.getElementById('provForm').reset(); showToast('Province added successfully'); loadProvinces(); }
    else showToast('Failed to add province', 'danger');
  });

  window.openEdit = (id, name) => {
    document.getElementById('editId').value = id;
    document.getElementById('editName').value = name;
    editModal.show();
  };

  document.getElementById('btnSaveEdit').addEventListener('click', async () => {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('editName').value.trim();
    if (!name) return;
    const res = await fetch(`/provinces/${id}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ name })
    });
    editModal.hide();
    if (res.ok) { showToast('Province updated'); loadProvinces(); }
    else showToast('Update failed', 'danger');
  });

  window.delProv = async id => {
    if (!confirm('Delete this province?')) return;
    const res = await fetch(`/provinces/${id}`,{ method:'DELETE', headers:{ 'Authorization':'Bearer '+token }});
    if (res.ok) { showToast('Province deleted', 'warning'); loadProvinces(); }
    else showToast('Delete failed', 'danger');
  };

  loadProvinces();
</script>
{% endblock %}
