<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login  SINEMA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      min-height: 100vh;
      background: #f0f2f7;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-wrap {
      display: flex; width: 100%; max-width: 900px; min-height: 540px;
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.18); margin: 1.5rem;
      animation: fadeUp .45s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .auth-panel {
      flex: 0 0 42%;
      background: linear-gradient(160deg, #1b2a4a 0%, #1e3a6e 50%, #0f6e5e 100%);
      color: #fff; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2.5rem; position: relative; overflow: hidden;
    }
    .auth-panel::before {
      content:''; position:absolute; width:320px; height:320px; border-radius:50%;
      background:rgba(255,255,255,.05); top:-100px; right:-80px;
    }
    .auth-panel::after {
      content:''; position:absolute; width:180px; height:180px; border-radius:50%;
      background:rgba(255,255,255,.06); bottom:-50px; left:-40px;
    }
    .auth-panel img { max-height:300px; z-index:1; margin-bottom:1.6rem; }
    .auth-panel h2 { font-weight:800; font-size:1.55rem; z-index:1; text-align:center; margin-bottom:.5rem; }
    .auth-panel p  { font-size:.83rem; opacity:.65; z-index:1; text-align:center; line-height:1.6; margin-bottom:0; }
    .badge-pill {
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
      border-radius:30px; padding:.35em 1em; font-size:.72rem; letter-spacing:.5px;
      z-index:1; margin-top:1.2rem;
    }
    .auth-form {
      flex:1; background:#fff; display:flex; flex-direction:column;
      justify-content:center; padding:3rem;
    }
    .auth-form h3 { font-weight:800; font-size:1.45rem; color:#1b2a4a; margin-bottom:.3rem; }
    .auth-form .sub { font-size:.83rem; color:#8a93a4; margin-bottom:2rem; }
    .input-group-icon { position:relative; }
    .input-group-icon .field-icon {
      position:absolute; left:.9rem; top:50%; transform:translateY(-50%);
      color:#aab0bc; font-size:1rem; z-index:5; pointer-events:none;
    }
    .input-group-icon input {
      padding-left:2.5rem !important; border-radius:10px !important;
      border:1.5px solid #dde2ec; background:#f8f9fc;
      transition:border-color .2s, box-shadow .2s; height:46px; font-size:.9rem;
    }
    .input-group-icon input:focus {
      border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); background:#fff;
    }
    .toggle-pw {
      position:absolute; right:.85rem; top:50%; transform:translateY(-50%);
      cursor:pointer; color:#aab0bc; z-index:5; background:none; border:none; padding:0;
    }
    .toggle-pw:hover { color:#2563eb; }
    .btn-auth {
      height:46px; border-radius:10px; font-weight:700; font-size:.92rem;
      background:linear-gradient(135deg,#1e3a6e,#2563eb); border:none;
      letter-spacing:.3px; transition:opacity .2s, transform .15s;
    }
    .btn-auth:hover { opacity:.9; transform:translateY(-1px); }
    .btn-auth:active { transform:translateY(0); }
    #loginAlert { border-radius:10px; font-size:.84rem; padding:.6rem .9rem; display:none; }
    .divider {
      display:flex; align-items:center; gap:.75rem;
      margin:1.4rem 0 1.2rem; color:#c2c9d6; font-size:.75rem;
    }
    .divider::before, .divider::after { content:''; flex:1; border-top:1px solid #e8ebf2; }
    .auth-link { font-size:.83rem; text-align:center; color:#8a93a4; }
    .auth-link a { color:#2563eb; font-weight:600; text-decoration:none; }
    .auth-link a:hover { text-decoration:underline; }
    @media (max-width:640px) {
      .auth-panel { display:none; }
      .auth-form  { padding:2.5rem 2rem; }
      .auth-wrap  { border-radius:18px; }
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-panel">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="SINEMA Logo"/>
      <h2>Welcome Back</h2>
      <p>Spatial Information for Landslide &amp; Environment Monitoring &amp; Annotation</p>
      <div class="badge-pill">
        <i class="bi bi-shield-lock me-1"></i> Secure  Blockchain-backed
      </div>
    </div>
    <div class="auth-form">
      <h3>Sign In</h3>
      <p class="sub">Enter your credentials to access the dashboard</p>
      <div class="alert alert-danger" id="loginAlert" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i>
        <span id="loginAlertMsg">Invalid username or password.</span>
      </div>
      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold" style="font-size:.85rem;color:#3d4a5c;">Username</label>
          <div class="input-group-icon">
            <i class="bi bi-person field-icon"></i>
            <input type="text" class="form-control" id="username"
                   placeholder="Your username" required autocomplete="username"/>
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold" style="font-size:.85rem;color:#3d4a5c;">Password</label>
          <div class="input-group-icon">
            <i class="bi bi-lock field-icon"></i>
            <input type="password" class="form-control" id="password"
                   placeholder="Your password" required autocomplete="current-password"/>
            <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
              <i class="bi bi-eye" id="togglePwIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-auth btn-primary w-100" id="loginBtn">
          <span id="loginBtnText"><i class="bi bi-box-arrow-in-right me-1"></i>Sign In</span>
          <span id="loginBtnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-1"></span> Signing in
          </span>
        </button>
      </form>
      <div class="divider">or</div>
      <p class="auth-link">Don't have an account? <a href="/register">Create one</a></p>
    </div>
  </div>
  <script>
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw   = document.getElementById('password');
      const icon = document.getElementById('togglePwIcon');
      if (pw.type === 'password') { pw.type = 'text';     icon.className = 'bi bi-eye-slash'; }
      else                        { pw.type = 'password'; icon.className = 'bi bi-eye'; }
    });
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const alertEl = document.getElementById('loginAlert');
      const msgEl   = document.getElementById('loginAlertMsg');
      const btnTxt  = document.getElementById('loginBtnText');
      const btnSp   = document.getElementById('loginBtnSpinner');
      const btn     = document.getElementById('loginBtn');
      alertEl.style.display = 'none';
      btnTxt.classList.add('d-none'); btnSp.classList.remove('d-none'); btn.disabled = true;
      try {
        const res  = await fetch('/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem('token', data.access_token);
          location.href = '/dashboard';
        } else {
          msgEl.textContent = data.msg || 'Invalid username or password.';
          alertEl.style.display = 'flex';
        }
      } catch (_) {
        msgEl.textContent = 'Network error. Please try again.';
        alertEl.style.display = 'flex';
      } finally {
        btnTxt.classList.remove('d-none'); btnSp.classList.add('d-none'); btn.disabled = false;
      }
    });
  </script>
</body>
</html>
